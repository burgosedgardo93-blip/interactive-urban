<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Layers — 4D Historical San Francisco</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #0e0e1a;
      color: #e0d5c5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */

    #header {
      background: rgba(8, 8, 18, 0.97);
      border-bottom: 1px solid #3a3020;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
      flex-shrink: 0;
      z-index: 1000;
    }

    #title {
      font-size: 1.3rem;
      letter-spacing: 0.12em;
      color: #d4a857;
      white-space: nowrap;
      line-height: 1.2;
    }

    #title span {
      font-size: 0.68rem;
      color: #666;
      display: block;
      letter-spacing: 0.08em;
      font-family: 'Arial', sans-serif;
      margin-top: 1px;
    }

    /* ── Year slider ─────────────────────────────────────────────────────── */

    #year-control {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 200px;
      max-width: 380px;
    }

    #year-label {
      font-family: 'Arial', sans-serif;
      font-size: 0.72rem;
      color: #777;
      white-space: nowrap;
    }

    #year-display {
      font-size: 1.55rem;
      font-weight: bold;
      color: #d4a857;
      min-width: 3.2rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    #year-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: linear-gradient(to right, #d4a857 var(--pct, 60%), #3a3020 var(--pct, 60%));
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    #year-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      background: #d4a857;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(212,168,87,0.5);
      cursor: pointer;
    }

    #year-slider::-moz-range-thumb {
      width: 15px;
      height: 15px;
      background: #d4a857;
      border-radius: 50%;
      border: none;
      cursor: pointer;
    }

    #year-range {
      font-family: 'Arial', sans-serif;
      font-size: 0.65rem;
      color: #555;
      white-space: nowrap;
    }

    /* ── Category pills ──────────────────────────────────────────────────── */

    #category-filters {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
    }

    #filters-label {
      font-family: 'Arial', sans-serif;
      font-size: 0.68rem;
      color: #666;
      margin-right: 2px;
    }

    .cat-pill {
      padding: 3px 11px;
      border-radius: 12px;
      border: 1px solid transparent;
      font-family: 'Arial', sans-serif;
      font-size: 0.68rem;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      user-select: none;
      letter-spacing: 0.04em;
      background: transparent;
    }

    .cat-pill.active { opacity: 1; }
    .cat-pill:not(.active) {
      opacity: 0.35;
      filter: grayscale(0.6);
    }

    /* ── Map area ────────────────────────────────────────────────────────── */

    #map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #map { width: 100%; height: 100%; }

    /* ── Counter badge ───────────────────────────────────────────────────── */

    #counter {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(8, 8, 18, 0.88);
      border: 1px solid #3a3020;
      border-radius: 5px;
      padding: 6px 12px;
      font-family: 'Arial', sans-serif;
      font-size: 0.72rem;
      color: #888;
      z-index: 900;
      pointer-events: none;
    }

    #counter strong { color: #d4a857; }

    /* ── Legend ──────────────────────────────────────────────────────────── */

    #legend {
      position: absolute;
      bottom: 30px;
      left: 12px;
      background: rgba(8, 8, 18, 0.88);
      border: 1px solid #3a3020;
      border-radius: 5px;
      padding: 10px 14px;
      font-family: 'Arial', sans-serif;
      font-size: 0.7rem;
      color: #888;
      z-index: 900;
      pointer-events: none;
    }

    #legend h4 {
      color: #d4a857;
      margin-bottom: 8px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Leaflet popup overrides ─────────────────────────────────────────── */

    .leaflet-popup-content-wrapper {
      background: rgba(10, 10, 22, 0.97);
      border: 1px solid #3a3020;
      border-radius: 6px;
      color: #e0d5c5;
      box-shadow: 0 6px 24px rgba(0,0,0,0.75);
    }

    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button { color: #666 !important; font-size: 18px !important; top: 8px !important; right: 10px !important; }
    .leaflet-popup-close-button:hover { color: #d4a857 !important; }

    .leaflet-popup-content {
      margin: 14px 16px 14px 16px;
      min-width: 230px;
      max-width: 290px;
    }

    .popup-img-placeholder {
      width: 100%;
      height: 72px;
      background: #16162a;
      border-radius: 4px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-family: 'Arial', sans-serif;
      font-size: 0.68rem;
      font-style: italic;
    }

    .popup-img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 10px;
      background: #16162a;
      display: block;
    }

    .popup-cat {
      font-family: 'Arial', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .popup-title {
      font-size: 1.05rem;
      color: #d4a857;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .popup-year {
      font-family: 'Arial', sans-serif;
      font-size: 0.74rem;
      color: #888;
      margin-bottom: 9px;
    }

    .popup-demolished {
      color: #e05555;
      margin-left: 6px;
    }

    .popup-desc {
      font-size: 0.78rem;
      color: #b0a595;
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .popup-architect {
      font-family: 'Arial', sans-serif;
      font-size: 0.7rem;
      color: #666;
      font-style: italic;
    }

    /* ── Loading shimmer ─────────────────────────────────────────────────── */

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .loading {
      position: relative;
      overflow: hidden;
    }

    .loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(212, 168, 87, 0.12) 50%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shimmer 1.1s ease-in-out infinite;
      pointer-events: none;
      border-radius: inherit;
    }
  </style>
</head>
<body>

<div id="header">
  <div id="title">
    URBAN LAYERS
    <span>4D Historical San Francisco</span>
  </div>

  <div id="year-control">
    <div id="year-label">Viewing year</div>
    <span id="year-display">1950</span>
    <input type="range" id="year-slider" min="1791" max="2000" value="1950" step="1">
    <span id="year-range">1791 – 2000</span>
  </div>

  <div id="category-filters">
    <span id="filters-label">Filter:</span>
  </div>
</div>

<div id="map-container">
  <div id="map"></div>

  <div id="counter">
    Showing <strong id="visible-count">—</strong> of <strong id="total-count">12</strong> structures
  </div>

  <div id="legend">
    <h4>LEGEND</h4>
    <div class="legend-row">
      <div class="legend-dot" style="background:#d4a857; box-shadow:0 0 4px #d4a85766;"></div>
      Standing at this year
    </div>
    <div class="legend-row">
      <div class="legend-dot" style="background:#e05555; box-shadow:0 0 4px #e0555566;"></div>
      Later demolished
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// DATA MODEL: { id, year, title, category, desc, lat, lng, architect, demolished, img }
// demolished: null = still standing | number = year it was demolished
// BASE_RECORDS: seeded fallback used when the LOC API is unreachable
// ─────────────────────────────────────────────────────────────────────────────

const BASE_RECORDS = [
  {
    id: "sf-001",
    year: 1898,
    title: "Ferry Building",
    category: "civic",
    desc: "Beaux-Arts transit hub and marketplace at the foot of Market Street. Its 245-foot clock tower survived the 1906 earthquake nearly intact, becoming a symbol of the city's resilience.",
    lat: 37.7955, lng: -122.3937,
    architect: "A. Page Brown",
    demolished: null,
    img: null
  },
  {
    id: "sf-002",
    year: 1915,
    title: "San Francisco City Hall",
    category: "civic",
    desc: "Rebuilt after the 1906 earthquake, this Beaux-Arts masterpiece features a dome taller than the U.S. Capitol. Designed to project civic confidence after the disaster.",
    lat: 37.7793, lng: -122.4193,
    architect: "Arthur Brown Jr.",
    demolished: null,
    img: null
  },
  {
    id: "sf-003",
    year: 1972,
    title: "Transamerica Pyramid",
    category: "commercial",
    desc: "Postmodern skyscraper that became the most recognizable feature of the SF skyline. Controversial at its 1972 opening, it is now a protected landmark.",
    lat: 37.7952, lng: -122.4028,
    architect: "William Pereira",
    demolished: null,
    img: null
  },
  {
    id: "sf-004",
    year: 1896,
    title: "Sutro Baths",
    category: "entertainment",
    desc: "The world's largest indoor swimming complex in its day, holding over 1.6 million gallons in six saltwater pools. A marvel of Victorian engineering, destroyed by fire in 1966.",
    lat: 37.7799, lng: -122.5133,
    architect: "Adolph Sutro",
    demolished: 1966,
    img: null
  },
  {
    id: "sf-005",
    year: 1886,
    title: "Haas-Lilienthal House",
    category: "residential",
    desc: "One of the few intact Victorian-era mansions in San Francisco. This Queen Anne–style home survived the 1906 earthquake and fire and is now a house museum.",
    lat: 37.7875, lng: -122.4327,
    architect: "Peter R. Schmidt",
    demolished: null,
    img: null
  },
  {
    id: "sf-006",
    year: 1959,
    title: "Embarcadero Freeway",
    category: "infrastructure",
    desc: "Double-deck elevated freeway that bisected downtown from the waterfront. Long contested by preservationists, it was demolished after sustaining damage in the 1989 Loma Prieta earthquake.",
    lat: 37.7956, lng: -122.3975,
    architect: null,
    demolished: 1991,
    img: null
  },
  {
    id: "sf-007",
    year: 1915,
    title: "Palace of Fine Arts",
    category: "civic",
    desc: "Designed for the 1915 Panama-Pacific International Exposition, this beloved Roman-classical rotunda was preserved permanently. The current concrete structure is a 1960s reconstruction.",
    lat: 37.8029, lng: -122.4484,
    architect: "Bernard Maybeck",
    demolished: null,
    img: null
  },
  {
    id: "sf-008",
    year: 1913,
    title: "Spreckels Mansion",
    category: "residential",
    desc: "Lavish Beaux-Arts palace built for sugar heiress Alma de Bretteville Spreckels, inspired by the Palace of Versailles. Now a private residence, owned for many years by author Danielle Steel.",
    lat: 37.7921, lng: -122.4444,
    architect: "George Applegarth",
    demolished: null,
    img: null
  },
  {
    id: "sf-009",
    year: 1933,
    title: "Coit Tower",
    category: "civic",
    desc: "Art Deco tower atop Telegraph Hill, built with funds bequeathed by Lillie Hitchcock Coit to beautify the city. Its interior New Deal murals depicting labor and society remain controversial.",
    lat: 37.8024, lng: -122.4058,
    architect: "Arthur Brown Jr.",
    demolished: null,
    img: null
  },
  {
    id: "sf-010",
    year: 1791,
    title: "Mission Dolores",
    category: "religious",
    desc: "Oldest intact building in San Francisco, founded as Mission San Francisco de Asís. The adobe walls have withstood every earthquake since the Spanish colonial period.",
    lat: 37.7652, lng: -122.4270,
    architect: null,
    demolished: null,
    img: null
  },
  {
    id: "sf-011",
    year: 1909,
    title: "Cliff House",
    category: "entertainment",
    desc: "Third iteration of a Victorian pleasure resort perched on the cliffs above Ocean Beach. The current Adirondack-style building replaced a grand château that burned in 1907.",
    lat: 37.7786, lng: -122.5134,
    architect: "Reid Brothers",
    demolished: null,
    img: null
  },
  {
    id: "sf-012",
    year: 1866,
    title: "Woodward's Gardens",
    category: "entertainment",
    desc: "San Francisco's first great amusement park, covering two city blocks between Mission and Valencia. Featured a zoo, aquarium, art gallery, and amphitheater before closing in 1891.",
    lat: 37.7677, lng: -122.4181,
    architect: null,
    demolished: 1894,
    img: null
  }
];

// ─────────────────────────────────────────────────────────────────────────────
// CATEGORY CONFIG
// ─────────────────────────────────────────────────────────────────────────────

const CATEGORIES = {
  civic:          { color: "#5b9bd5", label: "Civic" },
  commercial:     { color: "#7ec88a", label: "Commercial" },
  residential:    { color: "#e8a44a", label: "Residential" },
  infrastructure: { color: "#a782c3", label: "Infrastructure" },
  entertainment:  { color: "#e07a7a", label: "Entertainment" },
  religious:      { color: "#6ecfcf", label: "Religious" }
};

// ─────────────────────────────────────────────────────────────────────────────
// LOC API — CONSTANTS
// ─────────────────────────────────────────────────────────────────────────────

const LOC_BASE    = "https://www.loc.gov/photos/";
const YEAR_WINDOW = 10;   // ± years around slider value
const DEBOUNCE_MS = 450;  // wait after slider stops moving before fetching

// SF centroid used for all LOC records (API provides no coordinates)
const SF_LAT = 37.7749;
const SF_LNG = -122.4194;

// ─────────────────────────────────────────────────────────────────────────────
// LOC API — CATEGORY CLASSIFIER
//
// Reads an array of LoC subject heading strings and maps them to one of five
// semantic classes (civic / commerce / culture / industry / residence), then
// translates to the nearest existing CATEGORIES key.
// ─────────────────────────────────────────────────────────────────────────────

const SUBJECT_RULES = [
  // Each entry: [regex tested against joined subjects, raw class name]
  // Order matters — more specific patterns first.
  [/city.?hall|court.?house|government|municipal|post.?office|federal|public.?build|civic|capitol|library|school|university|fire.?station|police/i, "civic"],
  [/church|cathedral|temple|synagogue|chapel|mission|convent|monastery/i,                                                                           "civic"],
  [/theater|theatre|opera|museum|gallery|park|garden|recreation|amusement|fair|expo|festival|entertainment|stadium|arena|ballpark/i,                "culture"],
  [/store|shop|market|bank|hotel|restaurant|saloon|office.?build|commercial|department.?store|warehouse|wharf|dock/i,                              "commerce"],
  [/factory|factories|manufact|industry|industrial|mill|brewery|cannery|foundry|railroad|railway|bridge|transit|cable.?car|ferry|port|harbor|waterfront|sewer|utility/i, "industry"],
  [/dwell|house|houses|home|homes|apartment|tenement|residential|neighborhood|cottage|flat|suburb/i,                                               "residence"],
];

// Maps the 5 raw classifier outputs → existing CATEGORIES keys
const LOC_CAT_MAP = {
  civic:    "civic",
  culture:  "entertainment",
  commerce: "commercial",
  industry: "infrastructure",
  residence:"residential",
};

function classifySubjects(subjects) {
  const text = [].concat(subjects || []).join(" ");
  for (const [pattern, raw] of SUBJECT_RULES) {
    if (pattern.test(text)) return LOC_CAT_MAP[raw] || "civic";
  }
  return "civic"; // default when no subject heading matches
}

// ─────────────────────────────────────────────────────────────────────────────
// LOC API — FIELD MAPPING HELPERS
// ─────────────────────────────────────────────────────────────────────────────

// Parse the first 4-digit historical year from free-form LoC date strings
// e.g. "ca. 1905", "1890-1910", "between 1900 and 1906"
function parseLocYear(dateStr) {
  const m = String(dateStr || "").match(/\b(1[5-9]\d{2}|20[012]\d)\b/);
  return m ? parseInt(m[1], 10) : null;
}

// Deterministic lat/lng jitter from a string seed so that LOC records
// (which carry no coordinates) scatter around the SF centroid rather than
// all landing on the same pixel. Spread: ~±2 km in each axis.
function jitterCoords(seed) {
  let h = 5381;
  for (let i = 0; i < seed.length; i++) {
    h = Math.imul(h, 31) ^ seed.charCodeAt(i);
  }
  const lat = SF_LAT + (((h & 0xff) - 128) / 128) * 0.018;
  const lng = SF_LNG + ((((h >>> 8) & 0xff) - 128) / 128) * 0.024;
  return { lat, lng };
}

// Map a single LoC search result → our data model
// Returns null for items missing a parseable year or title (skipped by caller)
function mapLocItem(item, idx) {
  // Stable ID from item URL ("/item/2017771068/") or generate a fallback
  const urlMatch = String(item.url || "").match(/\/item\/([^/?#]+)/);
  const id = "loc-" + (urlMatch ? urlMatch[1] : `${idx}-${Date.now()}`);

  const year = parseLocYear(item.date);
  if (!year) return null;

  const title = (item.title || "").replace(/\s*[,/.\-–—]+\s*$/, "").trim();
  if (!title) return null;

  // Subject headings may appear as `subject` or `subject_headings`
  const subjects = (item.subject || []).concat(item.subject_headings || []);
  const category = classifySubjects(subjects);

  // Description is sometimes a string, sometimes an array
  const descRaw = Array.isArray(item.description)
    ? item.description.join(" ")
    : (item.description || "");
  const desc = descRaw.slice(0, 300);

  // Prefer medium JPG; fall back to small GIF thumbnail
  const img = item.resources?.[0]?.medium
           || item.resources?.[0]?.small
           || null;

  const { lat, lng } = jitterCoords(id);

  return { id, year, title, category, desc, lat, lng,
           architect: null, demolished: null, img };
}

// ─────────────────────────────────────────────────────────────────────────────
// LOC API — FETCH
// ─────────────────────────────────────────────────────────────────────────────

// Builds the URL exactly as documented: literal `:` and `|` in the fa param,
// avoiding URLSearchParams encoding that would corrupt the facet syntax.
function buildLocUrl(year) {
  const lo = Math.max(1700, year - YEAR_WINDOW);
  const hi = Math.min(2000, year + YEAR_WINDOW);
  return `${LOC_BASE}?q=san+francisco` +
    `&fa=location:san+francisco|online-format:image` +
    `&dates=${lo}/${hi}` +
    `&fo=json&c=50&sp=1`;
}

async function fetchLocRecords(year, signal) {
  const res = await fetch(buildLocUrl(year), { signal });
  if (!res.ok) throw new Error(`LOC HTTP ${res.status}`);
  const data = await res.json();
  return (data.results || [])
    .map((item, i) => mapLocItem(item, i))
    .filter(Boolean);
}

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────

let viewYear        = 1950;
let activeCategories = new Set(Object.keys(CATEGORIES));
let records         = [...BASE_RECORDS]; // starts as seeded; replaced by API results
let fetchController = null;              // AbortController for in-flight request
let debounceTimer   = null;

// ─────────────────────────────────────────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────────────────────────────────────────

const map = L.map("map", {
  center: [37.762, -122.440],
  zoom: 13,
  zoomControl: true
});

L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  {
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: "abcd",
    maxZoom: 19
  }
).addTo(map);

// ─────────────────────────────────────────────────────────────────────────────
// MARKER HELPERS
// ─────────────────────────────────────────────────────────────────────────────

function makeIcon(catColor, willBeDemolished) {
  const stroke = willBeDemolished ? "#e05555" : catColor;
  const fill   = willBeDemolished ? "rgba(224,85,85,0.2)" : catColor + "30";
  const glow   = willBeDemolished ? "#e05555" : catColor;
  return L.divIcon({
    className: "",
    html: `<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" fill="${fill}" stroke="${stroke}" stroke-width="2"/>
      <circle cx="12" cy="12" r="4.5" fill="${stroke}" style="filter:drop-shadow(0 0 3px ${glow})"/>
    </svg>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12],
    popupAnchor: [0, -16]
  });
}

function buildPopup(r) {
  const cat = CATEGORIES[r.category] || CATEGORIES.civic;
  const demolishedTag = r.demolished
    ? `<span class="popup-demolished">demolished ${r.demolished}</span>`
    : "";
  const architectLine = r.architect
    ? `<div class="popup-architect">Architect: ${r.architect}</div>`
    : "";
  const imgBlock = r.img
    ? `<img class="popup-img" src="${r.img}" alt="${r.title}" loading="lazy">`
    : `<div class="popup-img-placeholder">Photo — Library of Congress</div>`;

  return `
    ${imgBlock}
    <div class="popup-cat" style="color:${cat.color}">${cat.label}</div>
    <div class="popup-title">${r.title}</div>
    <div class="popup-year">Built ${r.year}${demolishedTag}</div>
    <div class="popup-desc">${r.desc}</div>
    ${architectLine}
  `;
}

// ─────────────────────────────────────────────────────────────────────────────
// FILTER LOGIC
// ─────────────────────────────────────────────────────────────────────────────

function isVisible(r) {
  if (!activeCategories.has(r.category)) return false;
  if (r.year > viewYear) return false;                                       // not yet built
  if (r.demolished !== null && r.demolished <= viewYear) return false;       // already gone
  return true;
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────

const markersLayer = L.layerGroup().addTo(map);

function render() {
  markersLayer.clearLayers();
  let count = 0;

  records.forEach(r => {
    if (!isVisible(r)) return;
    count++;

    const catColor = (CATEGORIES[r.category] || CATEGORIES.civic).color;
    const willBeDemolished = r.demolished !== null && r.demolished > viewYear;

    const marker = L.marker([r.lat, r.lng], {
      icon: makeIcon(catColor, willBeDemolished),
      title: r.title
    });
    marker.bindPopup(buildPopup(r), { maxWidth: 320 });
    markersLayer.addLayer(marker);
  });

  document.getElementById("visible-count").textContent = count;
  document.getElementById("total-count").textContent   = records.length;
}

// ─────────────────────────────────────────────────────────────────────────────
// LOADING STATE
// ─────────────────────────────────────────────────────────────────────────────

function setLoading(on) {
  document.getElementById("counter").classList.toggle("loading", on);
  if (on) document.getElementById("visible-count").textContent = "…";
}

// ─────────────────────────────────────────────────────────────────────────────
// FETCH + UPDATE
// Aborts any in-flight request before issuing a new one.
// On success:  records = API results (falls back to BASE_RECORDS if empty)
// On error:    records = BASE_RECORDS, warning logged to console
// AbortError:  silently ignored — a newer request is already in flight
// ─────────────────────────────────────────────────────────────────────────────

async function fetchAndMerge(year) {
  if (fetchController) fetchController.abort();
  fetchController = new AbortController();

  setLoading(true);
  try {
    const apiRecords = await fetchLocRecords(year, fetchController.signal);
    records = apiRecords.length > 0 ? apiRecords : [...BASE_RECORDS];
  } catch (err) {
    if (err.name === "AbortError") return; // superseded — leave loading on for next request
    console.warn("[Urban Layers] LOC fetch failed; using seeded records.", err.message);
    records = [...BASE_RECORDS];
  }
  setLoading(false);
  render();
}

// ─────────────────────────────────────────────────────────────────────────────
// YEAR SLIDER
// ─────────────────────────────────────────────────────────────────────────────

const sliderEl  = document.getElementById("year-slider");
const displayEl = document.getElementById("year-display");
const MIN_YEAR  = parseInt(sliderEl.min, 10);
const MAX_YEAR  = parseInt(sliderEl.max, 10);

function updateSliderGradient() {
  const pct = ((viewYear - MIN_YEAR) / (MAX_YEAR - MIN_YEAR)) * 100;
  sliderEl.style.setProperty("--pct", pct.toFixed(1) + "%");
}

sliderEl.addEventListener("input", () => {
  viewYear = parseInt(sliderEl.value, 10);
  displayEl.textContent = viewYear;
  updateSliderGradient();
  render();                                       // instant re-filter from current records
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => fetchAndMerge(viewYear), DEBOUNCE_MS);
});

// ─────────────────────────────────────────────────────────────────────────────
// CATEGORY PILLS
// ─────────────────────────────────────────────────────────────────────────────

const filtersEl = document.getElementById("category-filters");

Object.entries(CATEGORIES).forEach(([key, { color, label }]) => {
  const pill = document.createElement("button");
  pill.className = "cat-pill active";
  pill.textContent = label;
  pill.dataset.cat = key;
  pill.style.borderColor = color;
  pill.style.backgroundColor = color + "28";
  pill.style.color = color;

  pill.addEventListener("click", () => {
    if (activeCategories.has(key)) {
      activeCategories.delete(key);
      pill.classList.remove("active");
    } else {
      activeCategories.add(key);
      pill.classList.add("active");
    }
    render();
  });

  filtersEl.appendChild(pill);
});

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────

updateSliderGradient();
render();               // show seeded records immediately while API loads
fetchAndMerge(viewYear); // then fetch live LOC data
</script>
</body>
</html>
