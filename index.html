<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urban Layers — 4D Historical San Francisco</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #0e0e1a;
      color: #e0d5c5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */

    #header {
      background: rgba(8, 8, 18, 0.97);
      border-bottom: 1px solid #3a3020;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 28px;
      flex-wrap: wrap;
      flex-shrink: 0;
      z-index: 1000;
    }

    #title {
      font-size: 1.3rem;
      letter-spacing: 0.12em;
      color: #d4a857;
      white-space: nowrap;
      line-height: 1.2;
    }

    #title span {
      font-size: 0.68rem;
      color: #666;
      display: block;
      letter-spacing: 0.08em;
      font-family: 'Arial', sans-serif;
      margin-top: 1px;
    }

    /* ── Year slider ─────────────────────────────────────────────────────── */

    #year-control {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 200px;
      max-width: 380px;
    }

    #year-label {
      font-family: 'Arial', sans-serif;
      font-size: 0.72rem;
      color: #777;
      white-space: nowrap;
    }

    #year-display {
      font-size: 1.55rem;
      font-weight: bold;
      color: #d4a857;
      min-width: 3.2rem;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    #year-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      background: linear-gradient(to right, #d4a857 var(--pct, 60%), #3a3020 var(--pct, 60%));
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    #year-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px;
      height: 15px;
      background: #d4a857;
      border-radius: 50%;
      box-shadow: 0 0 6px rgba(212,168,87,0.5);
      cursor: pointer;
    }

    #year-slider::-moz-range-thumb {
      width: 15px;
      height: 15px;
      background: #d4a857;
      border-radius: 50%;
      border: none;
      cursor: pointer;
    }

    #year-range {
      font-family: 'Arial', sans-serif;
      font-size: 0.65rem;
      color: #555;
      white-space: nowrap;
    }

    /* ── Category pills ──────────────────────────────────────────────────── */

    #category-filters {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
    }

    #filters-label {
      font-family: 'Arial', sans-serif;
      font-size: 0.68rem;
      color: #666;
      margin-right: 2px;
    }

    .cat-pill {
      padding: 3px 11px;
      border-radius: 12px;
      border: 1px solid transparent;
      font-family: 'Arial', sans-serif;
      font-size: 0.68rem;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      user-select: none;
      letter-spacing: 0.04em;
      background: transparent;
    }

    .cat-pill.active { opacity: 1; }
    .cat-pill:not(.active) {
      opacity: 0.35;
      filter: grayscale(0.6);
    }

    /* ── Map area ────────────────────────────────────────────────────────── */

    #map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #map { width: 100%; height: 100%; }

    /* ── Counter badge ───────────────────────────────────────────────────── */

    #counter {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(8, 8, 18, 0.88);
      border: 1px solid #3a3020;
      border-radius: 5px;
      padding: 6px 12px;
      font-family: 'Arial', sans-serif;
      font-size: 0.72rem;
      color: #888;
      z-index: 900;
      pointer-events: none;
    }

    #counter strong { color: #d4a857; }

    /* ── Legend ──────────────────────────────────────────────────────────── */

    #legend {
      position: absolute;
      bottom: 30px;
      left: 12px;
      background: rgba(8, 8, 18, 0.88);
      border: 1px solid #3a3020;
      border-radius: 5px;
      padding: 10px 14px;
      font-family: 'Arial', sans-serif;
      font-size: 0.7rem;
      color: #888;
      z-index: 900;
      pointer-events: none;
    }

    #legend h4 {
      color: #d4a857;
      margin-bottom: 8px;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 4px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Leaflet popup overrides ─────────────────────────────────────────── */

    .leaflet-popup-content-wrapper {
      background: rgba(10, 10, 22, 0.97);
      border: 1px solid #3a3020;
      border-radius: 6px;
      color: #e0d5c5;
      box-shadow: 0 6px 24px rgba(0,0,0,0.75);
    }

    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button { color: #666 !important; font-size: 18px !important; top: 8px !important; right: 10px !important; }
    .leaflet-popup-close-button:hover { color: #d4a857 !important; }

    .leaflet-popup-content {
      margin: 14px 16px 14px 16px;
      min-width: 230px;
      max-width: 290px;
    }

    .popup-img-placeholder {
      width: 100%;
      height: 72px;
      background: #16162a;
      border-radius: 4px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-family: 'Arial', sans-serif;
      font-size: 0.68rem;
      font-style: italic;
    }

    .popup-img {
      width: 100%;
      height: 130px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 10px;
      background: #16162a;
      display: block;
    }

    .popup-cat {
      font-family: 'Arial', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .popup-title {
      font-size: 1.05rem;
      color: #d4a857;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .popup-year {
      font-family: 'Arial', sans-serif;
      font-size: 0.74rem;
      color: #888;
      margin-bottom: 9px;
    }

    .popup-demolished {
      color: #e05555;
      margin-left: 6px;
    }

    .popup-desc {
      font-size: 0.78rem;
      color: #b0a595;
      line-height: 1.55;
      margin-bottom: 8px;
    }

    .popup-architect {
      font-family: 'Arial', sans-serif;
      font-size: 0.7rem;
      color: #666;
      font-style: italic;
    }

    /* ── Loading shimmer ─────────────────────────────────────────────────── */

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .loading {
      position: relative;
      overflow: hidden;
    }

    .loading::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(212, 168, 87, 0.12) 50%,
        transparent 100%
      );
      background-size: 200% 100%;
      animation: shimmer 1.1s ease-in-out infinite;
      pointer-events: none;
      border-radius: inherit;
    }

    /* ── Marker transitions ──────────────────────────────────────────────── */

    .leaflet-marker-icon {
      transition: opacity 200ms ease;
    }

    /* ── 3D toggle button ────────────────────────────────────────────────── */

      padding: 4px 14px;
      border-radius: 12px;
      border: 1px solid #d4a857;

      font-size: 0.68rem;
      cursor: pointer;
      background: transparent;
      color: #d4a857;
      letter-spacing: 0.06em;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #toggle-3d:hover     { background: rgba(212,168,87,0.12); }
    #toggle-3d.active-3d { background: #d4a857; color: #0e0e1a; }
  </style>
</head>
<body>

<div id="header">

  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─────────────────────────────────────────────────────────────────────────────
// DATA MODEL: { id, year, title, category, desc, lat, lng, architect, demolished, img }
// demolished: null = still standing | number = year it was demolished
// BASE_RECORDS: seeded fallback used when the LOC API is unreachable
// ─────────────────────────────────────────────────────────────────────────────

const BASE_RECORDS = [

  },

  },
  {

  },
  {

    img: null
  },
  {
    id: "sf-010",
    year: 1791,
    title: "Mission Dolores",
    category: "religious",
    desc: "Oldest intact building in San Francisco, founded as Mission San Francisco de Asís. The adobe walls have withstood every earthquake since the Spanish colonial period.",
    lat: 37.7652, lng: -122.4270,
    architect: null,
    demolished: null,
    img: null
  },
  {
    id: "sf-011",
    year: 1909,
    title: "Cliff House",
    category: "entertainment",
    desc: "Third iteration of a Victorian pleasure resort perched on the cliffs above Ocean Beach. The current Adirondack-style building replaced a grand château that burned in 1907.",
    lat: 37.7786, lng: -122.5134,

  },
  {
    id: "sf-012",
    year: 1866,
    title: "Woodward's Gardens",
    category: "entertainment",
    desc: "San Francisco's first great amusement park, covering two city blocks between Mission and Valencia. Featured a zoo, aquarium, art gallery, and amphitheater before closing in 1891.",
    lat: 37.7677, lng: -122.4181,
    architect: null,
    demolished: 1894,
    img: null
  }
];

// ─────────────────────────────────────────────────────────────────────────────
// CATEGORY CONFIG
// ─────────────────────────────────────────────────────────────────────────────

const CATEGORIES = {
  civic:          { color: "#5b9bd5", label: "Civic" },
  commercial:     { color: "#7ec88a", label: "Commercial" },
  residential:    { color: "#e8a44a", label: "Residential" },
  infrastructure: { color: "#a782c3", label: "Infrastructure" },
  entertainment:  { color: "#e07a7a", label: "Entertainment" },
  religious:      { color: "#6ecfcf", label: "Religious" }
};

// ─────────────────────────────────────────────────────────────────────────────
// LOC IMAGE ENRICHMENT
//
// LoC is now a secondary source: it fills img_url gaps for records that have
// no photo stored in Supabase. Records themselves come from Supabase.
// ─────────────────────────────────────────────────────────────────────────────

const LOC_BASE    = "https://www.loc.gov/photos/";
const DEBOUNCE_MS = 300; // debounce for slider input and map pan/zoom

// Fetch a single LoC photo URL matching title + year (±5-year window).
// Throws on AbortError so the caller (enrichImages) can detect cancellation.
async function fetchLocImg(title, year, signal) {
  const q  = encodeURIComponent(title.replace(/'/g, ""));
  const lo = Math.max(1700, year - 5);
  const hi = Math.min(2030, year + 5);
  const url = `${LOC_BASE}?q=${q}` +
    `&fa=location:san+francisco|online-format:image` +
    `&dates=${lo}/${hi}&fo=json&c=3&sp=1`;
  const res = await fetch(url, { signal }); // throws AbortError when cancelled
  if (!res.ok) return null;
  const data = await res.json();
  const item = (data.results || [])[0];
  return item?.resources?.[0]?.medium ?? item?.resources?.[0]?.small ?? null;
}

// For every record without an img, fire a LoC lookup and update it in place.
// Refreshes the Leaflet popup for that marker as each image arrives.
// Returns the count of records that received a LoC image.
async function enrichImages(recs, signal) {
  let count = 0;
  const jobs = recs
    .filter(r => !r.img)
    .map(async r => {
      try {
        const img = await fetchLocImg(r.title, r.year, signal);
        if (!img) return;
        r.img = img;
        const entry = markerRegistry.get(r.id);
        if (entry) entry.marker.setPopupContent(buildPopup(r));
        count++;
      } catch (e) {
        if (e.name !== "AbortError") console.warn("[LoC img]", r.title, e.message);
      }
    });
  await Promise.allSettled(jobs);
  return count;
}

// ─────────────────────────────────────────────────────────────────────────────
// SUPABASE CLIENT
//
// Credentials are read from window globals so the app works without a build
// step. Set these in a <script> before this file:
//   window.SUPABASE_URL      = 'https://<ref>.supabase.co';
//   window.SUPABASE_ANON_KEY = 'eyJ...';
// If either is missing the app falls back to BASE_RECORDS silently.
// ─────────────────────────────────────────────────────────────────────────────

let _sbClient = null;

async function getSupabaseClient() {
  if (_sbClient) return _sbClient;
  const url = window.SUPABASE_URL;
  const key = window.SUPABASE_ANON_KEY;
  if (!url || !key) {
    console.warn(
      "[Urban Layers] window.SUPABASE_URL / window.SUPABASE_ANON_KEY not set. " +
      "Falling back to seeded records."
    );
    return null;
  }
  const { createClient } = await import("https://esm.sh/@supabase/supabase-js@2");
  _sbClient = createClient(url, key);
  return _sbClient;
}

// Mirrors fetchRecordsByBBox from supabase-client.js, inlined here so the
// frontend works without a build step (no bare import specifier resolution).
async function fetchFromSupabase(bounds, yearRange) {
  const client = await getSupabaseClient();
  if (!client) return null; // credentials not configured

  const { north, south, east, west } = bounds;
  const { from, to } = yearRange;

  const { data, error } = await client
    .from("records")
    .select("id, year, title, category, description, lat, lng, architect, demolished, img_url, source")
    .eq("verified", true)
    .gte("lat", south).lte("lat", north)
    .gte("lng", west).lte("lng", east)
    .lte("year", to)
    .or(`demolished.is.null,demolished.gte.${from}`)
    .order("year", { ascending: true });

  if (error) throw new Error(`Supabase: ${error.message}`);

  return (data ?? []).map(row => ({
    id:         row.id,
    year:       row.year,
    title:      row.title,
    category:   row.category,
    desc:       row.description ?? "",
    lat:        row.lat,
    lng:        row.lng,
    architect:  row.architect  ?? null,
    demolished: row.demolished ?? null,
    img:        row.img_url    ?? null,
    source:     row.source,
  }));
}

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────

let viewYear         = 1950;
let activeCategories = new Set(Object.keys(CATEGORIES));
let records          = [...BASE_RECORDS]; // seeded fallback; replaced by Supabase results
let debounceTimer    = null;
let fetchGen         = 0;                 // generation counter — detects superseded fetches
let imgAbort         = null;              // AbortController for in-flight LoC image enrichment
let dbRecordCount    = BASE_RECORDS.length;
let locImageCount    = 0;

// ─────────────────────────────────────────────────────────────────────────────
// MAP INIT
// ─────────────────────────────────────────────────────────────────────────────

const map = L.map("map", {
  center: [37.762, -122.440],
  zoom: 13,
  zoomControl: true
});

L.tileLayer(
  "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  {
    attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: "abcd",
    maxZoom: 19
  }
).addTo(map);

// ─────────────────────────────────────────────────────────────────────────────
// MARKER HELPERS
// ─────────────────────────────────────────────────────────────────────────────

// state: "normal" | "ghost" | "future"
// Ghost markers get a dashed SVG border; element opacity is set separately.
function makeIcon(catColor, state) {
  const fill      = catColor + "30";
  const dashAttr  = state === "ghost" ? ' stroke-dasharray="3 3"' : "";
  return L.divIcon({
    className: "",
    html: `<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" fill="${fill}" stroke="${catColor}" stroke-width="2"${dashAttr}/>
      <circle cx="12" cy="12" r="4.5" fill="${catColor}" style="filter:drop-shadow(0 0 3px ${catColor})"/>
    </svg>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12],
    popupAnchor: [0, -16]
  });
}

function buildPopup(r) {
  const cat = CATEGORIES[r.category] || CATEGORIES.civic;
  const demolishedTag = r.demolished
    ? `<span class="popup-demolished">demolished ${r.demolished}</span>`
    : "";
  const architectLine = r.architect
    ? `<div class="popup-architect">Architect: ${r.architect}</div>`
    : "";
  const imgBlock = r.img
    ? `<img class="popup-img" src="${r.img}" alt="${r.title}" loading="lazy">`
    : `<div class="popup-img-placeholder">Photo — Library of Congress</div>`;

  return `
    ${imgBlock}
    <div class="popup-cat" style="color:${cat.color}">${cat.label}</div>
    <div class="popup-title">${r.title}</div>
    <div class="popup-year">Built ${r.year}${demolishedTag}</div>
    <div class="popup-desc">${r.desc}</div>
    ${architectLine}
  `;
}

// ─────────────────────────────────────────────────────────────────────────────
// TEMPORAL LAYER LOGIC
//
// Pure function — no side effects, fully unit-testable.
// Returns one of three states for a record at a given slider year:
//   "future"  — not yet built; hidden entirely
//   "ghost"   — demolished before `year`; shown faded with dashed border
//   "normal"  — standing at `year`; shown at full opacity
// ─────────────────────────────────────────────────────────────────────────────

function getMarkerState(r, year) {
  if (r.year > year) return "future";
  if (r.demolished !== null && r.demolished <= year) return "ghost";
  return "normal";
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
//
// Uses a persistent markerRegistry so existing Leaflet elements are updated
// in-place rather than destroyed and recreated. This lets CSS opacity
// transitions (200ms ease) run on state changes instead of markers popping.
//
// markerRegistry: Map<id, { marker: L.Marker, state: string }>
// ─────────────────────────────────────────────────────────────────────────────

const markersLayer  = L.layerGroup().addTo(map);
const markerRegistry = new Map(); // id → { marker, state }

// Target CSS opacity for each temporal state
const STATE_OPACITY = { normal: "1", ghost: "0.35", future: "0" };

function applyOpacity(el, state, animate) {
  if (!el) return;
  el.style.transition    = animate ? "opacity 200ms ease" : "none";
  el.style.opacity       = STATE_OPACITY[state];
  el.style.pointerEvents = state === "future" ? "none" : "auto";
}

function render() {
  // Build the set of IDs that should have markers (category-active records)
  const activeIds = new Set(
    records.filter(r => activeCategories.has(r.category)).map(r => r.id)
  );

  // ── Remove/fade-out stale markers ──────────────────────────────────────
  for (const [id, entry] of markerRegistry) {
    if (activeIds.has(id)) continue;
    markerRegistry.delete(id);
    const el = entry.marker.getElement();
    if (el) {
      el.style.transition    = "opacity 200ms ease";
      el.style.opacity       = "0";
      el.style.pointerEvents = "none";
      const m = entry.marker;
      setTimeout(() => markersLayer.removeLayer(m), 210);
    } else {
      markersLayer.removeLayer(entry.marker);
    }
  }

  // ── Add/update markers ─────────────────────────────────────────────────
  let normalCount = 0;

  records.forEach(r => {
    if (!activeCategories.has(r.category)) return;

    const state    = getMarkerState(r, viewYear);
    const catColor = (CATEGORIES[r.category] || CATEGORIES.civic).color;

    if (!markerRegistry.has(r.id)) {
      // New marker: add to layer, fade in from transparent
      const marker = L.marker([r.lat, r.lng], {
        icon: makeIcon(catColor, state),
        title: r.title
      });
      marker.bindPopup(buildPopup(r), { maxWidth: 320 });
      markersLayer.addLayer(marker);

      const el = marker.getElement();
      if (el) {
        applyOpacity(el, "future", false);           // start invisible (no transition)
        requestAnimationFrame(() => applyOpacity(el, state, true)); // animate to target
      }

      markerRegistry.set(r.id, { marker, state });
    } else {
      // Existing marker: only update icon + opacity when state has changed
      const entry = markerRegistry.get(r.id);
      if (entry.state !== state) {
        entry.marker.setIcon(makeIcon(catColor, state));
        applyOpacity(entry.marker.getElement(), state, true);
        entry.state = state;
      }
    }

    if (state === "normal") normalCount++;
  });

  document.getElementById("visible-count").textContent = normalCount;
  updateCounter();

  // Sync 3D layer whenever the 2D render runs
  if (threeMode && threeReady) { tUpdateMesh(); tRender(); }
}

// ─────────────────────────────────────────────────────────────────────────────
// LOADING STATE
// ─────────────────────────────────────────────────────────────────────────────

function setLoading(on) {
  document.getElementById("counter").classList.toggle("loading", on);
  if (on) document.getElementById("visible-count").textContent = "…";
}

// ─────────────────────────────────────────────────────────────────────────────
// COUNTER UPDATE
// Separated from render() so enrichImages() can refresh the count
// after LoC images arrive without triggering a full marker re-render.
// ─────────────────────────────────────────────────────────────────────────────

function updateCounter() {
  const locSuffix = locImageCount > 0 ? ` · ${locImageCount} LoC img` : "";
  document.getElementById("total-count").textContent = dbRecordCount + locSuffix;
}

// ─────────────────────────────────────────────────────────────────────────────
// FETCH + UPDATE
//
// Primary source: Supabase fetchRecordsByBBox (bbox + year filter).
// Secondary:      LoC image enrichment for records with no img_url in Supabase.
// Fallback:       BASE_RECORDS when Supabase is not configured or returns empty.
//
// Ordering is handled with a generation counter (fetchGen) rather than
// AbortController because the Supabase JS client does not natively expose
// the underlying fetch signal. LoC image fetches use a separate AbortController
// (imgAbort) so they can be cancelled immediately when a new call arrives.
// ─────────────────────────────────────────────────────────────────────────────

async function fetchData() {
  const myGen = ++fetchGen;

  // Cancel any in-flight LoC image enrichment from the previous call
  if (imgAbort) { imgAbort.abort(); imgAbort = null; }

  setLoading(true);
  try {
    const bnd = map.getBounds();
    const supaRows = await fetchFromSupabase(
      { north: bnd.getNorth(), south: bnd.getSouth(),
        east:  bnd.getEast(),  west:  bnd.getWest() },
      { from: MIN_YEAR, to: viewYear }
    );

    if (myGen !== fetchGen) return; // superseded — a newer call already ran

    if (supaRows === null) {
      // Supabase not configured — keep seeded fallback
      records = [...BASE_RECORDS];
    } else {
      records = supaRows.length > 0 ? supaRows : [...BASE_RECORDS];
    }

    dbRecordCount = records.length;
    locImageCount = 0;
    setLoading(false);
    render(); // show DB records immediately

    // Enrich missing images from LoC — runs concurrently, updates popups as
    // each result arrives; cancelled instantly if fetchData() is called again
    imgAbort = new AbortController();
    locImageCount = await enrichImages(records, imgAbort.signal);
    if (myGen === fetchGen && locImageCount > 0) updateCounter();

  } catch (err) {
    if (myGen !== fetchGen) return;
    console.warn("[Urban Layers] Data fetch failed; using seeded records.", err.message);
    records = [...BASE_RECORDS];
    dbRecordCount = records.length;
    locImageCount = 0;
    setLoading(false);
    render();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// YEAR SLIDER
// ─────────────────────────────────────────────────────────────────────────────

const sliderEl  = document.getElementById("year-slider");
const displayEl = document.getElementById("year-display");
const MIN_YEAR  = parseInt(sliderEl.min, 10);
const MAX_YEAR  = parseInt(sliderEl.max, 10);

function updateSliderGradient() {
  const pct = ((viewYear - MIN_YEAR) / (MAX_YEAR - MIN_YEAR)) * 100;
  sliderEl.style.setProperty("--pct", pct.toFixed(1) + "%");
}

sliderEl.addEventListener("input", () => {
  viewYear = parseInt(sliderEl.value, 10);
  displayEl.textContent = viewYear;
  updateSliderGradient();
  render();                          // instant re-filter from current in-memory records
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(fetchData, DEBOUNCE_MS);
});

// Re-query Supabase whenever the map viewport changes (new bbox = new records)
map.on("moveend zoomend", () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(fetchData, DEBOUNCE_MS);
});

// ─────────────────────────────────────────────────────────────────────────────
// CATEGORY PILLS
// ─────────────────────────────────────────────────────────────────────────────

const filtersEl = document.getElementById("category-filters");

Object.entries(CATEGORIES).forEach(([key, { color, label }]) => {
  const pill = document.createElement("button");
  pill.className = "cat-pill active";
  pill.textContent = label;
  pill.dataset.cat = key;
  pill.style.borderColor = color;
  pill.style.backgroundColor = color + "28";
  pill.style.color = color;

  pill.addEventListener("click", () => {
    if (activeCategories.has(key)) {
      activeCategories.delete(key);
      pill.classList.remove("active");
    } else {
      activeCategories.add(key);
      pill.classList.add("active");
    }
    render();
  });

  filtersEl.appendChild(pill);
});

// ─────────────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────────────

updateSliderGradient();
render();        // show seeded BASE_RECORDS immediately while Supabase connects
fetchData();     // primary: Supabase bbox query; LoC fills img gaps for null img_url

// ─────────────────────────────────────────────────────────────────────────────
// THREE.JS 3D LAYER
//
// Loaded lazily on first 3D activation via dynamic import() so it does not
// delay the initial 2D map load. Runs in the same script scope, giving it
// direct access to map, records, viewYear, CATEGORIES, getMarkerState, and
// activeCategories without any global pollution.
//
// Rendering strategy:
//   • OrthographicCamera tilted ~23° from vertical → isometric depth effect
//   • Two InstancedMesh instances (normal + ghost) → one draw call per state
//   • Buildings projected via map.latLngToContainerPoint for perfect alignment
//   • Box height scales with zoom level (doubles per zoom step)
// ─────────────────────────────────────────────────────────────────────────────

let threeMode  = false;
let threeReady = false;
let tRenderer, tScene, tCamera, tMeshNormal, tMeshGhost, tDummy, tColor;

async function initThree() {
  if (threeReady) return;

  const THREE  = await import("https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js");
  const canvas = document.getElementById("three-canvas");
  const sz     = map.getSize();
  const asp    = sz.x / sz.y;

  // ── Renderer ────────────────────────────────────────────────────────────
  tRenderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  tRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  tRenderer.setSize(sz.x, sz.y, false);

  // ── Scene & shared helpers ───────────────────────────────────────────────
  tScene = new THREE.Scene();
  tDummy = new THREE.Object3D();
  tColor = new THREE.Color();

  // Warm ambient fill + directional light from upper-left to reveal box faces
  tScene.add(new THREE.AmbientLight(0xffeedd, 0.5));
  const dir = new THREE.DirectionalLight(0xffd080, 1.0);
  dir.position.set(-0.6, -0.8, 1.5);
  tScene.add(dir);

  // ── Camera — orthographic with ~23° tilt for isometric building depth ────
  // Camera at (0, -0.4, 0.915): atan(0.4 / 0.915) ≈ 23.6° from vertical.
  // A building of height h appears h·sin(23°) ≈ 0.39h NDC units "above"
  // its map footprint, giving visible tower depth without breaking alignment.
  tCamera = new THREE.OrthographicCamera(-asp, asp, 1, -1, -20, 20);
  tCamera.position.set(0, -0.4, 0.915);
  tCamera.lookAt(0, 0, 0);

  // ── Two InstancedMesh instances: one per temporal state ──────────────────
  // Separate meshes let us set material.opacity per-state without a custom
  // shader. renderOrder ensures ghost (transparent) draws after normal.
  const MAX = 1000;
  const geo = new THREE.BoxGeometry(1, 1, 1); // unit box; scaled via tDummy

  tMeshNormal = new THREE.InstancedMesh(geo,
    new THREE.MeshPhongMaterial({ vertexColors: true, shininess: 55 }),
    MAX
  );
  tMeshGhost = new THREE.InstancedMesh(geo,
    new THREE.MeshPhongMaterial({ vertexColors: true, transparent: true, opacity: 0.28, shininess: 20 }),
    MAX
  );
  tMeshNormal.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  tMeshGhost.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
  tMeshGhost.renderOrder = 1;

  tScene.add(tMeshNormal, tMeshGhost);
  threeReady = true;
}

// Project WGS-84 lat/lng to Three.js world space.
// Delegates the hard coordinate math to Leaflet to guarantee alignment.
function tProject(lat, lng) {
  const pt  = map.latLngToContainerPoint([lat, lng]);
  const sz  = map.getSize();
  const asp = sz.x / sz.y;
  return {
    x:  ((pt.x / sz.x) * 2 - 1) * asp,
    y: -((pt.y / sz.y) * 2 - 1)
  };
}

// Building footprint (w) and tower height (h) in world units.
// Scales with zoom so buildings appear the right relative size at every level,
// capped at zoom 16 to prevent impractically large boxes on deep zooms.
function tBuildScale() {
  const sz  = map.getSize();
  const asp = sz.x / sz.y;
  const px  = 12 * Math.pow(2, Math.min(map.getZoom(), 16) - 13);
  const w   = (px / sz.x) * 2 * asp;
  return { w, h: w * 3 };
}

function tSyncCamera() {
  if (!threeReady) return;
  const sz  = map.getSize();
  const asp = sz.x / sz.y;
  tRenderer.setSize(sz.x, sz.y, false);
  tCamera.left  = -asp;
  tCamera.right =  asp;
  tCamera.updateProjectionMatrix();
}

function tUpdateMesh() {
  if (!threeReady) return;
  let nc = 0, gc = 0;
  const { w, h } = tBuildScale();
  const MAX = 1000;

  for (const r of records) {
    if (!activeCategories.has(r.category)) continue;
    if (nc + gc >= MAX) break;

    const state = getMarkerState(r, viewYear);
    if (state === "future") continue;

    const { x, y } = tProject(r.lat, r.lng);
    tColor.set(CATEGORIES[r.category]?.color ?? "#888888");

    // Box center at z = h/2 so the base sits at ground level (z = 0)
    tDummy.position.set(x, y, h / 2);
    tDummy.scale.set(w, w, h);
    tDummy.rotation.set(0, 0, 0);
    tDummy.updateMatrix();

    if (state === "normal") {
      tMeshNormal.setMatrixAt(nc, tDummy.matrix);
      tMeshNormal.setColorAt(nc, tColor);
      nc++;
    } else { // "ghost"
      tMeshGhost.setMatrixAt(gc, tDummy.matrix);
      tMeshGhost.setColorAt(gc, tColor);
      gc++;
    }
  }

  tMeshNormal.count = nc;
  tMeshGhost.count  = gc;
  tMeshNormal.instanceMatrix.needsUpdate = true;
  tMeshGhost.instanceMatrix.needsUpdate  = true;
  if (tMeshNormal.instanceColor) tMeshNormal.instanceColor.needsUpdate = true;
  if (tMeshGhost.instanceColor)  tMeshGhost.instanceColor.needsUpdate  = true;
}

function tRender() {
  if (!threeReady) return;
  tRenderer.render(tScene, tCamera);
}

// ── Toggle between 2D (Leaflet) and 3D (Three.js) views ─────────────────────
document.getElementById("toggle-3d").addEventListener("click", async () => {
  threeMode = !threeMode;
  const btn = document.getElementById("toggle-3d");

  if (threeMode) {
    await initThree();
    document.getElementById("three-canvas").style.display = "block";
    map.getPanes().markerPane.style.display = "none";
    map.getPanes().shadowPane.style.display = "none";
    tSyncCamera();
    tUpdateMesh();
    tRender();
    btn.textContent = "2D Mode";
    btn.classList.add("active-3d");
  } else {
    document.getElementById("three-canvas").style.display = "none";
    map.getPanes().markerPane.style.display = "";
    map.getPanes().shadowPane.style.display = "";
    btn.textContent = "3D Mode";
    btn.classList.remove("active-3d");
  }
});

// Re-project whenever the Leaflet viewport changes
map.on("moveend zoomend resize", () => {
  if (!threeMode || !threeReady) return;
  tSyncCamera();
  tUpdateMesh();
  tRender();
});
</script>
</body>
</html>
